update_config:
  name: Update configuration
  description: >-
    Used by the Security sidebar panel to add/remove entities and save
    settings. Can also be called from automations/scripts.
  fields:
    action:
      name: Action
      description: One of add, remove, rename, discover, settings or health_check.
      required: true
      example: add
      selector:
        select:
          options:
            - add
            - remove
            - rename
            - discover
            - settings
            - health_check
    type:
      name: List
      description: Which entity list to modify (for add/remove).
      example: doors
      selector:
        select:
          options:
            - doors
            - vibration
            - flood
            - sirens
            - lights
            - buttons
    entity_id:
      name: Entity
      description: The entity to add or remove (for add/remove).
      example: binary_sensor.front_door_contact
      selector:
        entity: {}
    name:
      name: Security display name
      description: Local display name used by the Security panel (for rename).
      selector:
        text: {}
    devices:
      name: Discovered devices
      description: Device lists supplied by the Security panel (for discover).
      selector:
        object: {}
    zones:
      name: Discovered zones
      description: Entity-to-area mapping supplied by the Security panel (for discover).
      selector:
        object: {}
